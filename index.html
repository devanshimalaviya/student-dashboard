<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>📊 Dashboard</h2>
        <ul>
            <li>🏠 Home</li>
            <li>📝 Tasks</li>
            <li>📈 Progress</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        <h1>Student Productivity</h1>

        <!-- To-do -->
        <div class="card">
            <h2>To-Do List</h2>

            <div class="input-box">
                <input type="text" id="taskInput" placeholder="Enter task">
                <input type="date" id="deadlineInput">
                <button onclick="addTask()">Add</button>
            </div>

            <input type="text" id="searchInput" placeholder="Search..." onkeyup="renderTasks()">

            <div class="filters">
                <button onclick="setFilter('all')">All</button>
                <button onclick="setFilter('completed')">Completed</button>
                <button onclick="setFilter('pending')">Pending</button>
            </div>

            <ul id="taskList"></ul>

            <button onclick="clearAll()" class="clear-btn">Clear All</button>
        </div>

        <!-- Progress -->
        <div class="card">
            <h2>Progress</h2>
            <div class="progress-bar">
                <div id="progress"></div>
            </div>
            <p id="progressText">0% completed</p>
        </div>

        <!-- Motivation -->
        <div class="card">
            <h2>Motivation</h2>
            <p id="quote"></p>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
